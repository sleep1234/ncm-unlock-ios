name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [ main, vpn ]

# 允许本工作流把状态分支 push 回仓库（供外部轮询监测构建是否结束）
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # 免签构建：越狱机用 TrollStore 安装（TrollStore 会按内嵌 entitlements 重新签名）。
      # 若需 Apple 官方签名 IPA，请在仓库 Secrets 配置 P12/PROFILE/TEAM_ID 后改用 archive+export 流程。
      - name: Build (unsigned, for jailbreak / TrollStore)
        id: build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme NCMUnlock \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      - name: Locate built .app
        id: locate
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "NCMUnlock.app" | head -1)
          if [ -z "$APP" ]; then
            echo "::error::NCMUnlock.app not found"
            find build -name "*.app" | head
            exit 1
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "found: $APP"

      - name: Package unsigned IPA
        run: |
          rm -rf Payload NCMUnlock.ipa
          mkdir -p Payload
          cp -R "${{ steps.locate.outputs.app }}" Payload/
          zip -r NCMUnlock.ipa Payload
          echo "ipa size: $(stat -f%z NCMUnlock.ipa 2>/dev/null || stat -c%s NCMUnlock.ipa) bytes"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NCMUnlock-unsigned.ipa
          path: NCMUnlock.ipa

      # 构建结束（成功或失败）都往仓库 push 一个 ci-status 分支，
      # 并把错误摘要塞进 commit message，外部可 fetch 后读到具体报错。
      - name: Report status (git-visible)
        if: always()
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp
          rm -rf ncm-ci
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/sleep1234/ncm-unlock-ios.git" ncm-ci
          cd ncm-ci
          git config user.email "ci@noreply.local"
          git config user.name "ncm-ci"
          MSG=$'ci: ${{ job.status }} run=${{ github.run_id }}'
          LOG="${{ github.workspace }}/build.log"
          if [ -f "$LOG" ]; then
            ERR=$(grep -iE "error:|fatal error|BUILD FAILED|Undefined symbols|undefined symbol|no such module|could not build|failed|LD_RUNPATHSEARCH|Swift Compiler Error" "$LOG" | tail -80)
            if [ -n "$ERR" ]; then
              MSG="$MSG"$'\n'"==== BUILD LOG (errors) ===="$'\n'"$ERR"
            fi
          fi
          git commit --allow-empty -m "$MSG"
          git push -f origin HEAD:refs/heads/ci-status
