name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [ main, vpn ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # 免签构建：越狱机用 TrollStore 安装（TrollStore 会按内嵌 entitlements 重新签名）。
      # 若需 Apple 官方签名 IPA，请在仓库 Secrets 配置 P12/PROFILE/TEAM_ID 后改用 archive+export 流程。
      - name: Build (unsigned, for jailbreak / TrollStore)
        run: |
          xcodebuild build \
            -scheme NCMUnlock \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            | xcpretty || true

      - name: Locate built .app
        id: locate
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "NCMUnlock.app" | head -1)
          if [ -z "$APP" ]; then
            echo "::error::NCMUnlock.app not found"
            find build -name "*.app" | head
            exit 1
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "found: $APP"

      - name: Package unsigned IPA
        run: |
          rm -rf Payload NCMUnlock.ipa
          mkdir -p Payload
          cp -R "${{ steps.locate.outputs.app }}" Payload/
          zip -r NCMUnlock.ipa Payload
          echo "ipa size: $(stat -f%z NCMUnlock.ipa 2>/dev/null || stat -c%s NCMUnlock.ipa) bytes"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NCMUnlock-unsigned.ipa
          path: NCMUnlock.ipa
