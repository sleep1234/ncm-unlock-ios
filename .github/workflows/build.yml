name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [ main, vpn ]

# 允许本工作流把状态分支 push 回仓库（供外部轮询监测构建是否结束）
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          set -o pipefail
          # 注意：不要传 --project NCMUnlock.xcodeproj，否则 XcodeGen 会把它当目录
          # 再叠加 name:NCMUnlock 生成嵌套的 NCMUnlock.xcodeproj/NCMUnlock.xcodeproj。
          # 直接按 project.yml 里的 name 在当前目录生成即可。
          xcodegen generate --spec project.yml 2>&1 | tee build.log
          echo "--- 兜底：把 objectVersion 77(Xcode16) 降到 56(Xcode15)，确保 Xcode 15.4 能打开 ---"
          # 即便 project.yml 的 projectFileFormat 因 XcodeGen 版本差异没生效，这里也强制降级。
          sed -i '' -E 's/(objectVersion = )77;/\156;/' NCMUnlock.xcodeproj/project.pbxproj
          grep -n "objectVersion" NCMUnlock.xcodeproj/project.pbxproj
          echo "--- ls xcodeproj ---"
          ls -la NCMUnlock.xcodeproj || echo "NO_XCODEPROJ_GENERATED"

      # 免签构建：越狱机用 TrollStore 安装（TrollStore 会按内嵌 entitlements 重新签名）。
      # 若需 Apple 官方签名 IPA，请在仓库 Secrets 配置 P12/PROFILE/TEAM_ID 后改用 archive+export 流程。
      - name: Build (unsigned, for jailbreak / TrollStore)
        id: build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme NCMUnlock \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee -a build.log

      - name: Locate built .app
        id: locate
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "NCMUnlock.app" | head -1)
          if [ -z "$APP" ]; then
            echo "::error::NCMUnlock.app not found"
            find build -name "*.app" | head
            exit 1
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "found: $APP"

      - name: Embed entitlements (ad-hoc codesign)
        run: |
          set -o pipefail
          APP="${{ steps.locate.outputs.app }}"
          # 1) 找到内嵌的 tunnel 扩展(嵌套代码必须先签)
          APPEX=$(find "$APP" -name "*.appex" | head -1)
          if [ -z "$APPEX" ]; then
            echo "::error::NCMUnlockTunnel.appex not found inside $APP"
            exit 1
          fi
          echo "--- codesign appex: $APPEX ---"
          cp NCMUnlockTunnel/NCMUnlockTunnel.entitlements /tmp/tunnel.entitlements
          # --deep 覆盖内嵌的 swift-nio framework；--entitlements 注入网络扩展权限
          codesign --force --deep --sign - --entitlements /tmp/tunnel.entitlements "$APPEX"

          echo "--- codesign app: $APP ---"
          cp NCMUnlock/NCMUnlock.entitlements /tmp/app.entitlements
          codesign --force --deep --sign - --entitlements /tmp/app.entitlements "$APP"

          # 2) 验证 entitlements 已注入(也作为构建自校验)
          echo "=== app entitlements ==="
          codesign -d --entitlements - "$APP" 2>/dev/null | grep -E "networkextension|application-groups" || { echo "::error::app 缺少 network extension entitlement"; exit 1; }
          echo "=== appex entitlements ==="
          codesign -d --entitlements - "$APPEX" 2>/dev/null | grep -E "networkextension|application-groups" || { echo "::error::appex 缺少 network extension entitlement"; exit 1; }
          echo "ENTITLEMENTS_EMBEDDED_OK"

      - name: Package unsigned IPA
        run: |
          rm -rf Payload NCMUnlock.ipa
          mkdir -p Payload
          cp -R "${{ steps.locate.outputs.app }}" Payload/
          zip -r NCMUnlock.ipa Payload
          echo "ipa size: $(stat -f%z NCMUnlock.ipa 2>/dev/null || stat -c%s NCMUnlock.ipa) bytes"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NCMUnlock-unsigned.ipa
          path: NCMUnlock.ipa

      # 构建结束（成功或失败）都往仓库 push 一个 ci-status 分支，
      # 并把错误摘要塞进 commit message，外部可 fetch 后读到具体报错。
      - name: Report status (git-visible)
        if: always()
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp
          rm -rf ncm-ci
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/sleep1234/ncm-unlock-ios.git" ncm-ci
          cd ncm-ci
          git config user.email "ci@noreply.local"
          git config user.name "ncm-ci"
          MSG=$'ci: ${{ job.status }} run=${{ github.run_id }}'
          LOG="${{ github.workspace }}/build.log"
          if [ -f "$LOG" ]; then
            TAIL=$(tail -400 "$LOG")
            MSG="$MSG"$'\n'"==== BUILD LOG (tail 400) ===="$'\n'"$TAIL"
          else
            MSG="$MSG"$'\n'"==== build.log NOT FOUND ===="
          fi
          git commit --allow-empty -m "$MSG"
          git push -f origin HEAD:refs/heads/ci-status
