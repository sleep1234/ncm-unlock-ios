name: Build NCM Unlock iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Theos
      run: |
        # 安装依赖
        brew install ldid dpkg
        
        # 克隆 Theos（带重试）
        for i in 1 2 3; do
          git clone --recursive https://github.com/theos/theos.git $HOME/theos && break
          echo "Attempt $i failed, retrying..."
          sleep 10
        done
        
        # 设置环境变量
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH
    
    - name: Install SDKs
      run: |
        export THEOS=$HOME/theos
        cd $THEOS
        
        # 下载 SDK（带重试）
        for i in 1 2 3; do
          if [ ! -d "sdks/iPhoneOS16.5.sdk" ]; then
            curl -L -o /tmp/sdk.zip "https://github.com/theos/sdks/archive/master.zip" || true
            if [ -f /tmp/sdk.zip ]; then
              unzip -q /tmp/sdk.zip -d sdks/ || true
              mv sdks/sdks-master/*.sdk sdks/ 2>/dev/null || true
              break
            fi
            echo "SDK download attempt $i failed, retrying..."
            sleep 10
          fi
        done
    
    - name: Build package
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        
        # 清理
        make clean || true
        
        # 编译
        make package FINALPACKAGE=1
    
    - name: List packages
      run: ls -la packages/ || echo "No packages directory"
    
    - name: Upload deb artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ncm-unlock-ios-deb
        path: packages/*.deb
        retention-days: 30
    
    - name: Create Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
      uses: softprops/action-gh-release@v1
      with:
        files: packages/*.deb
        tag_name: v${{ github.run_number }}
        name: NCM Unlock iOS v${{ github.run_number }}
        body: |
          ## NCM Unlock iOS
          
          解锁网易云音乐 VIP 歌曲
          
          ### 安装方法
          1. 下载 `.deb` 文件
          2. 使用 Filza 或 Sileo 安装
          3. 重启网易云音乐
          
          ### 功能
          - 解锁 VIP 歌曲播放
          - 支持多种音质选择（128k/192k/320k/FLAC）
          - 稳定音源：网易云、Joox、Bilibili
          - 在设置页面添加模块设置入口
          
          ### 署名
          —— 毛利老王
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
